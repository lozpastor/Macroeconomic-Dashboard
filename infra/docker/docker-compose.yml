services:
  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - api

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://macro:macro@postgres:5432/macro
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: macro
      POSTGRES_USER: macro
      POSTGRES_PASSWORD: macro
    ports:
      - "5432:5432"
    volumes:
      - macro_pg:/var/lib/postgresql/data
      - ../../db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ../../db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  macro_pg:
