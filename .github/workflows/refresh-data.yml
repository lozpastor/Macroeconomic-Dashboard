name: Refresh GDP data

on:
  schedule:
    # Weekly, Mondays 06:00 UTC. World Bank refreshes its indicators infrequently.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run fetch:data
      - name: Commit refreshed dataset
        run: |
          if git diff --quiet -- apps/web/public/data/gdp-dataset.json; then
            echo "Dataset unchanged; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web/public/data/gdp-dataset.json
          git commit -m "chore(data): refresh GDP dataset"
          git push
